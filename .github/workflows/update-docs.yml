name: Update auto-generated docs

on:
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4am UTC
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run all doc update scripts
        run: make update-all
      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/*/references/
          git diff --cached --quiet || git commit -m "chore: update auto-generated skill docs [skip ci]"
          git push
